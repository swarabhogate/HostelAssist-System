<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HostelAssist System - Faculty Registration</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #177e89, #0f5f6b);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 30px 16px;
    }

    .container {
        width: 100%;
        max-width: 560px;
        background: #ffffff;
        border-radius: 18px;
        padding: 36px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.25);
    }

    h2 {
        margin: 0 0 10px;
        text-align: center;
        color: #177e89;
    }

    .subtitle {
        margin: 0 0 24px;
        text-align: center;
        color: #5b676c;
    }

    .form-group {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #333;
    }

    input, select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #cfd8dc;
        font-size: 14px;
        box-sizing: border-box;
    }

    input:focus, select:focus {
        outline: none;
        border-color: #177e89;
        box-shadow: 0 0 0 3px rgba(23,126,137,0.15);
    }

    .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
    }

    button {
        width: 100%;
        padding: 14px;
        margin-top: 8px;
        background: linear-gradient(135deg, #177e89, #0f5f6b);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
    }

    button:hover {
        transform: translateY(-1px);
    }

    .links {
        margin-top: 18px;
        text-align: center;
    }

    .links a {
        color: #177e89;
        text-decoration: none;
        font-weight: 600;
    }

    .links a:hover {
        text-decoration: underline;
    }

    @media (max-width: 640px) {
        .container {
            padding: 24px;
        }

        .grid {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>
<body>

<div class="container">
    <h2>Faculty Registration</h2>
    <p class="subtitle">Faculty accounts are created only by admin.</p>

    <form id="facultyRegisterForm" action="login.html" method="GET">
        <div class="form-group">
            <label>Full Name</label>
                <input type="text" name="name" disabled>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>Email ID</label>
                <input type="email" name="email" disabled>
            </div>

            <div class="form-group">
                <label>Mobile</label>
                <input type="tel" name="mobile" pattern="[0-9]{10}" maxlength="10" disabled>
            </div>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>Department</label>
                <select name="department" disabled>
                    <option value="">Select Department</option>
                    <option>CSE</option>
                    <option>AIML</option>
                    <option>COMP</option>
                    <option>EXTC</option>
                    <option>CHEM</option>
                    <option>CIVIL</option>
                    <option>MECH</option>
                </select>
            </div>

            <div class="form-group">
                <label>Role</label>
                <select name="role" disabled>
                    <option value="">Select Role</option>
                    <option value="HOD">HOD</option>
                    <option value="Warden">Warden</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" id="password" disabled>
            </div>
            <div></div>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" id="confirmPassword" disabled>
        </div>

        <button type="submit">Go To Login</button>
    </form>

    <div class="links">
        Admin will create HOD and Warden accounts. <a href="login.html">Login</a>
    </div>
</div>

</body>
</html>
